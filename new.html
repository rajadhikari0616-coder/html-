<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raj Liquor Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body { background: #0f0f0f; color: #fff; }

    header {
      display: flex;ss
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: rgba(0,0,0,0.8);
      position: sticky;
      top: 0;
    }

    header h1 { color: gold; }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #fff;
      transition: 0.3s;
    }

    nav a:hover { color: gold; }

    .hero {
      height: 90vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1514361892635-6f03b5d6a9c3');
      background-size: cover;
      background-position: center;
    }

    .hero h2 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .hero button {
      padding: 12px 25px;
      border: none;
      background: gold;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      border-radius: 25px;
      transition: 0.3s;
    }

    .hero button:hover { background: #fff; }

    .products {
      padding: 50px;
      text-align: center;
    }

    .products h2 { margin-bottom: 30px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover { transform: translateY(-10px); }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .card h3 { margin-bottom: 10px; }

    .card button {
      margin-top: 10px;
      padding: 8px 15px;
      border: none;
      background: gold;
      cursor: pointer;
      border-radius: 20px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #000;
      margin-top: 30px;
    }
  </style>
</head>
<body>

<header>
  <h1>Raj Liquor store </h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>Premium Spirits & Fine Taste</h2>
    <p>Discover the best collection of whiskey, wine & vodka</p>
    <button>Shop Now</button>
  </div>
</section>

<section class="products">
  <h2>Featured Products</h2>
  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1605276374104-dee2a0ed3cd6" alt="Whiskey">
      <h3>Premium Whiskey</h3>
      <p>$45</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1510626176961-4b57d4fbad03" alt="Wine">
      <h3>Red Wine</h3>
      <p>$30</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1582571352031-4c0b1f8b8f5f" alt="Vodka">
      <h3>Classic Vodka</h3>
      <p>$25</p>
      <button>Buy Now</button>
    </div>

  </div>
</section>

<footer>
  <p>©
